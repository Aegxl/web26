<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой сайт</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4f46e5, #9333ea);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .card {
        background: rgba(255,255,255,0.1);
        padding: 40px;
        border-radius: 16px;
        backdrop-filter: blur(10px);
    }

    h1 {
        margin-bottom: 10px;
    }

    p {
        opacity: 0.9;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: white;
        color: #4f46e5;
        font-weight: bold;
    }

    button:hover {
        opacity: 0.9;
    }
</style>
</head>

<body>
    <div class="card">
        <h1>Привет 👋</h1>
        <p>Это уже красивее, правда?</p>
        <button onclick="alert('Сайт работает 🚀')">Нажми меня</button>
    </div>
</body>
</html>
